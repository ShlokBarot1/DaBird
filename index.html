<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link
      rel="preload"
      as="image"
      href="/images/optimized/hero-section-2.webp"
      fetchpriority="high"
      type="image/webp"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Da Bird</title>
<style>
      .initial-hero {
        position: relative;
        height: 100vh;
        min-height: 100svh;
        width: 100%;
        overflow: hidden;
        background: #071b2d;
      }

      .initial-hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 15%;
        display: block;
      }

      .initial-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.6) 100%);
      }

      .initial-hero h1 {
        position: absolute;
        left: 5%;
        bottom: 4rem;
        z-index: 1;
        margin: 0;
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: clamp(1.5rem, 3.5vw, 2.5rem);
        font-weight: 800;
        line-height: 1.1;
        text-transform: uppercase;
        white-space: pre-line;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-container">
        <main>
          <div class="page-shell">
            <section class="hero initial-hero">
              <div class="hero-background">
                <img
                  class="hero-lcp-image"
                  src="/images/optimized/hero-section-2.webp"
                  alt="Da Bird collection hero"
                  width="1920"
                  height="1072"
                  fetchpriority="high"
                  decoding="sync"
                />
                <div class="hero-overlay"></div>
              </div>
              <div class="hero-content-bottom-left">
                <div class="hero-text-wrapper">
                  <h1 class="hero-title"><a href="#shop" class="hero-massive-link">SHOP NOW
EXPLORE OUR FIRST
COLLECTION</a></h1>
                </div>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
